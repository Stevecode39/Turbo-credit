<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Turbo-credit is ready for fast, reliable deployment on Vercel."
    />
    <title>Turbo-credit</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel" aria-labelledby="title">
        <p class="eyebrow">Vercel deployment ready</p>
        <h1 id="title">Turbo-credit</h1>
        <p class="lede">
          A clean static foundation is configured for production builds from the
          main branch.
        </p>
        <div class="status-grid" aria-label="Deployment checklist">
          <div>
            <span>Build</span>
            <strong>npm run build</strong>
          </div>
          <div>
            <span>Output</span>
            <strong>dist</strong>
          </div>
          <div>
            <span>Platform</span>
            <strong>Vercel</strong>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
